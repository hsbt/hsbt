user: ubuntu
hosts:
  "www.hsbt.org:80":
    listen:
      port: 80
    paths:
      "/.well-known":
        file.dir: /home/ubuntu/www/hsbt.org/.well-known
      "/":
        redirect: https://www.hsbt.org/
  "www.hsbt.org:443":
    listen:
      port: 443
      ssl:
        certificate-file: "/etc/letsencrypt/live/www.hsbt.org/fullchain.pem"
        key-file: "/etc/letsencrypt/live/www.hsbt.org/privkey.pem"
    paths:
      /:
        file.dir: /home/ubuntu/www/hsbt.org
      /diary:
        file.dir: /home/ubuntu/www/hsbt.org/diary
        reproxy: ON
        mruby.handler: |
          require '/home/ubuntu/www/rewrite_rules.rb'
          lambda do |env|
            path = env["PATH_INFO"]
            qs   = env["QUERY_STRING"] || ""
            if path.include?('//') ||
               path =~ /\.html\// ||
               path =~ /%3[CE]/i ||
               path =~ %r{^/diary/[a-z0-9\-]+\.[a-z]{2,}/}i
              return [404, {"content-type" => "text/plain"}, ["Not Found"]]
            end
            if (path == "/diary" || path == "/diary/") &&
               !qs.empty? && qs !~ /\Adate=\d{4,8}\z/
              return [404, {"content-type" => "text/plain"}, ["Not Found"]]
            end
            RewriteRules.rewrite(env) do
              rewrite %r{^/diary/([0-9]+|[0-9]+\-[0-9]+)\.html$}, '/diary/index.fcgi?date=\1', :break
            end
          end
        fastcgi.connect:
          port: /run/tdiary/tdiary.sock
          type: unix
  "127.0.0.1:8080":
    listen:
      host: 127.0.0.1
      port: 8080
    paths:
      /diary/update.fcgi:
        mruby.handler: |
          lambda do |env|
            if (ref = env["HTTP_REFERER"])
              env["HTTP_REFERER"] = ref.sub("http://localhost:8080", "https://www.hsbt.org")
            end
            require "/home/ubuntu/www/htpasswd.rb"
            Htpasswd.new("/home/ubuntu/www/.htpasswd", "Basic Authentication").call(env)
          end
        fastcgi.spawn: "exec ~ubuntu/.rbenv/shims/ruby --yjit /home/ubuntu/app/tdiary/current/update.fcgi"
access-log: /var/log/h2o/access.log
error-log: /var/log/h2o/error.log
pid-file: /var/run/h2o/h2o.pid
