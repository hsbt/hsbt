# Machine bootstrap for this macOS setup, driven by `mise bootstrap`.
#
# For now this only covers the `launchctl setenv` LaunchAgents that were
# previously generated by the Rakefile `push_system_env` task from
# `system/env`. Each agent runs `launchctl setenv KEY "$HOME/..."` at login
# so GUI apps inherit these variables.
#
# `$HOME` is expanded at runtime by the agent's shell because mise does not
# template the launchd section; this keeps the file machine-independent.
#
# Apply (installs/loads dev.mise.*.SetEnv agents into gui/<uid>):
#   cd toolbox && mise trust && mise bootstrap macos launchd-agents apply
#
# Inspect without changing anything:
#   mise bootstrap macos launchd-agents status
#   mise bootstrap macos launchd-agents apply --dry-run

[bootstrap.macos.launchd.agents."GOPATH.SetEnv"]
program = "/bin/sh"
args = ["-c", "launchctl setenv GOPATH \"$HOME/.local/share/go\""]
run_at_load = true

[bootstrap.macos.launchd.agents."CARGO_HOME.SetEnv"]
program = "/bin/sh"
args = ["-c", "launchctl setenv CARGO_HOME \"$HOME/.local/share/cargo\""]
run_at_load = true

[bootstrap.macos.launchd.agents."ZDOTDIR.SetEnv"]
program = "/bin/sh"
args = ["-c", "launchctl setenv ZDOTDIR \"$HOME/.config/zsh\""]
run_at_load = true

[bootstrap.macos.launchd.agents."CLAUDE_CONFIG_DIR.SetEnv"]
program = "/bin/sh"
args = ["-c", "launchctl setenv CLAUDE_CONFIG_DIR \"$HOME/.config/claude\""]
run_at_load = true

[bootstrap.macos.launchd.agents."COPILOT_HOME.SetEnv"]
program = "/bin/sh"
args = ["-c", "launchctl setenv COPILOT_HOME \"$HOME/.config/copilot\""]
run_at_load = true
