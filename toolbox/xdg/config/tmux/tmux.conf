set-option -g default-shell /opt/homebrew/bin/zsh
set-option -g history-limit 100000
set-option -g status off
bind-key -T copy-mode Space send-keys -X begin-selection
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key w display-popup -E -w 80% -h 60% 'tmux list-panes -s -F "#{window_index}.#{pane_index}: #{pane_current_path} (#{pane_current_command})" | sk | cut -d: -f1 | xargs -I{} tmux select-pane -t {}'

